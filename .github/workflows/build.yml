# Heavy test jobs that require larger runners than the GitHub defaults
#
# Fast checks (linting, type checking, package build, etc.) run directly in the
# inspect_evals repository.

name: Tests
run-name: ${{ github.event.client_payload.is_pr == 'true' && format('(#{0}) - {1}', github.event.client_payload.pr_number, github.event.client_payload.pr_title) || 'Tests' }}

# `github.event.client_payload` expected from caller:
# {
#   "ref": "<git sha to checkout>",
#   "base_sha": "<base sha for PR comparison, empty for non-PRs>",
#   "pr_number": "<PR number or empty>",
#   "pr_title": "<PR title or empty>",
#   "is_pr": "true/false",
#   "source_repo": "UKGovernmentBEIS/inspect_evals"
# }
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "inspect_evals git ref/SHA to check out (blank = default branch)"
        required: false
        default: ""
      base_sha:
        description: "Base SHA for the targeted-slow-tests diff (blank = origin/main). Set an older commit to make slow tests actually run."
        required: false
        default: ""
      is_pr:
        description: "Set true to run the PR-only targeted-slow-tests job"
        required: false
        type: choice
        options: ["false", "true"]
        default: "false"
      run_all_slow_tests:
        description: "Run ALL slow tests (ignore the changed-files diff). Implies is_pr. Slow + many dataset downloads."
        required: false
        type: choice
        options: ["false", "true"]
        default: "false"
  # Fork-PR heavy tests, dispatched from UKGovernmentBEIS/inspect_evals. This checks
  # out and runs the PR head SHA (arbitrary code execution), so it is hardened:
  #   - no dataset secrets on this path (auth-needing tests skip; they run in the
  #     scheduled run-heavy-tests* workflows instead),
  #   - Linux-only under harden-runner (disable-sudo + egress allowlist), and
  #   - the inspect_evals dispatcher only fires this for a fork PR once a maintainer
  #     applies the "ok to test" label, which is auto-revoked on each new commit.
  # Incident-response runbook: UKGovernmentBEIS/inspect_evals/.github/security/.
  repository_dispatch:
    types: [build]

concurrency:
  group: tests-pr-${{ github.event.client_payload.pr_number || github.event.client_payload.ref || inputs.ref || github.run_id }}
  cancel-in-progress: true

# zizmor: excessive-permissions (https://docs.zizmor.sh/audits/#excessive-permissions)
permissions:
  contents: read

jobs:
  set-pending-status:
    name: Set pending check status on dispatching repo
    runs-on: ubuntu-latest
    steps:
      - name: Set pending commit status
        # INSPECT_EVALS_CHECKS_TOKEN posts the "Tests (inspect-evals-actions)"
        # commit status back onto the PR commit in the SOURCE repo
        # (UKGovernmentBEIS/inspect_evals). This is a cross-repo write, so the
        # built-in GITHUB_TOKEN (scoped to this repo) cannot do it.
        # Required permission, least-privilege:
        #   fine-grained PAT / GitHub App: "Commit statuses: Read and write"
        #     on UKGovernmentBEIS/inspect_evals only (no code or other access)
        #   classic PAT: repo:status scope (NOT full repo)
        # Also used by the "Update commit status" step in the report-status job.
        env:
          GH_TOKEN: ${{ secrets.INSPECT_EVALS_CHECKS_TOKEN }}
          SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          COMMIT_REF: ${{ github.event.client_payload.ref }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${SOURCE_REPO}/statuses/${COMMIT_REF}" \
            -f state="pending" \
            -f target_url="https://github.com/${REPO}/actions/runs/${RUN_ID}" \
            -f description="Tests in progress..." \
            -f context="Tests (inspect-evals-actions)"

  test:
    name: Fast tests (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest-8-cores]
        python-version: ["3.11", "3.12", "3.13"]
    env:
      RUN_SLOW_TESTS: no
      RUN_DATASET_DOWNLOAD_TESTS: yes
      UV_PYTHON: ${{ matrix.python-version }}

    steps:
      # Defense-in-depth: disable sudo to limit scope of untrusted PR code
      # and block egress to an allowlist. The fork-PR path is Linux-only because
      # harden-runner can't enforce either on Windows.
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          disable-sudo: true
          # Allowlist (host:port), enforced in block mode on Linux only:
          #   tooling:     releases.astral.sh (uv), pypi.org, files.pythonhosted.org
          #   GitHub:      github.com, api.github.com, raw.githubusercontent.com,
          #                release-assets.githubusercontent.com
          #   HuggingFace: huggingface.co, datasets-server.huggingface.co,
          #                {cas-bridge,cas-server,transfer}.xethub.hf.co, us.aws.cdn.hf.co
          #   datasets (which eval needs each, per inspect_evals/ASSETS.yaml):
          #     openaipublic.blob.core.windows.net — browse_comp, gpqa, healthbench, mgsm, simpleqa
          #     storage.googleapis.com + yonatanbisk.com — piqa
          #     s3.amazonaws.com — HF/`datasets` S3 backend (not an ASSETS direct_url)
          allowed-endpoints: >
            api.github.com:443
            cas-bridge.xethub.hf.co:443
            cas-server.xethub.hf.co:443
            datasets-server.huggingface.co:443
            files.pythonhosted.org:443
            github.com:443
            huggingface.co:443
            openaipublic.blob.core.windows.net:443
            pypi.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            releases.astral.sh:443
            s3.amazonaws.com:443
            storage.googleapis.com:443
            transfer.xethub.hf.co:443
            us.aws.cdn.hf.co:443
            yonatanbisk.com:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: UKGovernmentBEIS/inspect_evals
          ref: ${{ github.event.client_payload.ref || inputs.ref }}
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Cache uv downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/uv
          key: ${{ matrix.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('**/uv.lock', '**/pyproject.toml') }}
          restore-keys: |
            ${{ matrix.os }}-uv-${{ matrix.python-version }}-
            ${{ matrix.os }}-uv-

      - name: Cache Hugging Face datasets
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/huggingface
          # Keyed by OS (HF datasets are Python-version independent) and uv.lock
          # so a `datasets` bump invalidates the cache automatically.
          key: hf-datasets-${{ matrix.os }}-${{ hashFiles('uv.lock') }}

      - name: Install dependencies for python < 3.12
        if: ${{ matrix.python-version < '3.12' }}
        run: |
          uv sync --frozen --group dev --group test_py311_or_lower --group test

      - name: Install dependencies for python >= 3.12
        if: ${{ matrix.python-version >= '3.12' }}
        run: |
          uv sync --frozen --group dev --group test_py312_or_higher --group test

      - name: Run doctests
        run: |
          # Doctest step temporarily disabled. The targeted-file approach
          # (required to avoid broken isolated-eval imports and embedded
          # challenge scripts calling exit()) exposed pre-existing doctest
          # failures in bfcl, healthbench, mmlu, and deps_utils.
          # Those are being fixed in https://github.com/UKGovernmentBEIS/inspect_evals/pull/1751.
          # This step will be re-enabled once that PR merges.
          echo "Doctests temporarily disabled — see inspect_evals PR #1751"

      - name: Test with pytest
        # No HF/Kaggle secrets on the fork-PR path: tests that require should skip and run in scheduled run-heavy-tests workflows.
        shell: bash
        run: |
          uv run pytest -n 2 -rA --color=yes --cov=inspect_evals --durations=50 --report-log=pytest-report.jsonl \
            --ignore=tests/kernelbench \
            --ignore=tests/novelty_bench \
            --ignore=tests/livebench \
            --ignore=tests/mle_bench \
            --ignore=tests/cve_bench \
            --ignore=tests/bold \
            --ignore=tests/abstention_bench

      - name: Upload test report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-report-${{ matrix.os }}-py${{ matrix.python-version }}
          path: pytest-report.jsonl

  slow-test-check:
    name: Check slow tests are all marked
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download all pytest reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ./reports

      - name: Run slow test check
        shell: bash
        env:
          SLOW_TEST_REPORT_THRESHOLD: "10.0"
          SLOW_TEST_FAIL_THRESHOLD: "60.0"
        run: |
          python scripts/build/check_slow_tests.py --reports-dir ./reports

  clean-install-test:
    name: Clean install test (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}

    steps:
      # Defense-in-depth (incident 2026-06-09): see the test job for rationale.
      # This job's egress is small and stable (packages + GitHub, no dataset
      # downloads), so it uses block mode with a tiny allowlist.
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          # Allowlist (host:port), block mode on Linux only. Tiny, stable surface
          # (no datasets — this job only runs `inspect eval make_me_pay --limit=0`):
          #   tooling: releases.astral.sh (uv), pypi.org, files.pythonhosted.org
          #   GitHub:  github.com, api.github.com, raw.githubusercontent.com
          allowed-endpoints: >
            api.github.com:443
            files.pythonhosted.org:443
            github.com:443
            pypi.org:443
            raw.githubusercontent.com:443
            releases.astral.sh:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: UKGovernmentBEIS/inspect_evals
          ref: ${{ github.event.client_payload.ref || inputs.ref }}
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Cache uv downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/uv
          key: ${{ matrix.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('**/uv.lock', '**/pyproject.toml') }}
          restore-keys: |
            ${{ matrix.os }}-uv-${{ matrix.python-version }}-
            ${{ matrix.os }}-uv-

      - name: Install dependencies (locked), no extras
        run: |
          uv sync --frozen

      - name: Run a cli command that will expose registry import problems
        id: registry_check
        shell: bash
        run: |
          set +e  # Don't exit on error, we want to capture the output
          echo "::group::Running inspect eval command"
          echo "Command: uv run inspect eval inspect_evals/make_me_pay --limit=0"

          # Run the command and capture both stdout and stderr
          output=$(uv run inspect eval inspect_evals/make_me_pay --limit=0 2>&1)
          exit_code=$?

          echo "Exit code: $exit_code"
          echo "::endgroup::"

          echo "::group::Command output"
          if [ -z "$output" ]; then
            echo "(no output captured)"
          else
            echo "$output"
          fi
          echo "::endgroup::"

          # Check for error patterns in the output
          if echo "$output" | grep -q -E 'Unexpected exception loading entrypoints|No module named|ImportError|ModuleNotFoundError'; then
            echo "::error::Found import errors in the output. See 'Command output' group above for details."
            exit 1
          fi

          # Also check if no tasks were found, which could indicate a problem
          if echo "$output" | grep -q 'No inspect tasks were found'; then
            echo "::error::No inspect tasks were found, which might indicate a problem with the installation"
            exit 1
          fi

          # If the command itself failed, report that
          if [ $exit_code -ne 0 ]; then
            echo "::error::Command exited with code $exit_code. See 'Command output' group above for details."
            exit $exit_code
          fi

          echo "✓ Registry import check passed"

  targeted-slow-tests:
    name: Slow Tests relevant to PR
    if: ${{ github.event.client_payload.is_pr == 'true' || inputs.is_pr == 'true' || inputs.run_all_slow_tests == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest-8-cores]
    env:
      RUN_SLOW_TESTS: yes
      RUN_DATASET_DOWNLOAD_TESTS: yes
      UV_PYTHON: "3.12"

    steps:
      # Defense-in-depth: harden-runner's disable-sudo takes effect at job start
      # so is incompatible with jlumbroso/free-disk-space, which requires sudo,
      # and has hence been removed as it's not necessary with the larger runners.
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          disable-sudo: true
          # Allowlist (host:port), enforced in block mode on Linux only:
          #   tooling:     releases.astral.sh (uv), pypi.org, files.pythonhosted.org
          #   GitHub:      github.com, api.github.com, raw.githubusercontent.com,
          #                release-assets.githubusercontent.com, github-cloud.githubusercontent.com
          #   HuggingFace: huggingface.co, datasets-server.huggingface.co,
          #                {cas-server,transfer}.xethub.hf.co, us.aws.cdn.hf.co (Xet/LFS/CDN)
          #   Kaggle:      www.kaggle.com — mle_bench, mlrc_bench
          #   Sandbox build (any Docker-based eval): {auth,registry-1}.docker.io +
          #                production.cloudfront.docker.com (image pulls);
          #                {archive,security}.ubuntu.com:80 (apt); conda.anaconda.org
          #                (conda envs, e.g. mle_bench/mlrc_bench)
          #   datasets (which eval needs each, per inspect_evals/ASSETS.yaml):
          #     *.blob.core.windows.net — openaipublic (browse_comp, gpqa, healthbench,
          #       mgsm, simpleqa) + HF Xet's rotating Azure content shards
          #     storage.googleapis.com — piqa
          #     qasper-dataset.s3.us-west-2.amazonaws.com — abstention_bench
          #     drive.google.com + *.googleusercontent.com — abstention_bench, scicode, sciknoweval
          #     s3.amazonaws.com — HF/`datasets` S3 backend (not an ASSETS direct_url)
          # NOTE: *.googleusercontent.com and *.blob.core.windows.net are leading-"*."
          # wildcards for Google Drive download shards and HF Xet Azure content hosts,
          # which rotate per request and can't be pinned. A mid-host wildcard
          # (doc-*-*-docs.googleusercontent.com) was tried and DROPPED by harden-runner;
          # if these leading wildcards also drop on the next run, this job must use audit.
          allowed-endpoints: >
            api.github.com:443
            archive.ubuntu.com:80
            auth.docker.io:443
            cas-bridge.xethub.hf.co:443
            cas-server.xethub.hf.co:443
            conda.anaconda.org:443
            datasets-server.huggingface.co:443
            *.googleusercontent.com:443
            drive.google.com:443
            files.pythonhosted.org:443
            github-cloud.githubusercontent.com:443
            github.com:443
            huggingface.co:443
            *.blob.core.windows.net:443
            production.cloudfront.docker.com:443
            pypi.org:443
            qasper-dataset.s3.us-west-2.amazonaws.com:443
            raw.githubusercontent.com:443
            registry-1.docker.io:443
            release-assets.githubusercontent.com:443
            releases.astral.sh:443
            s3.amazonaws.com:443
            security.ubuntu.com:80
            storage.googleapis.com:443
            transfer.xethub.hf.co:443
            us.aws.cdn.hf.co:443
            www.kaggle.com:443

      - name: Checkout inspect_evals repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: UKGovernmentBEIS/inspect_evals
          ref: ${{ github.event.client_payload.ref || inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Determine base SHA for comparison
        id: base
        shell: bash
        env:
          CLIENT_BASE_SHA: ${{ github.event.client_payload.base_sha || inputs.base_sha }}
        run: |
          # Compute merge-base so the diff only reflects the PR's own
          # changes, not unrelated work merged into main since the branch point.
          BASE_REF="${CLIENT_BASE_SHA}"
          if [ -z "$BASE_REF" ]; then
            BASE_REF="origin/main"
          fi
          MERGE_BASE=$(git merge-base "$BASE_REF" HEAD)
          echo "sha=$MERGE_BASE" >> "$GITHUB_OUTPUT"
          echo "Using merge-base: $MERGE_BASE (base ref: $BASE_REF)"

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          base_sha: ${{ steps.base.outputs.sha }}
          files_yaml: |
            eval_src:
              - src/inspect_evals/**/*
            eval_tests:
              - tests/**/*

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Derive changed eval test paths
        id: collect
        shell: bash
        env:
          EVAL_SRC: ${{ steps.changed.outputs.eval_src_all_changed_files }}
          EVAL_TESTS: ${{ steps.changed.outputs.eval_tests_all_changed_files }}
          RUN_ALL_SLOW: ${{ inputs.run_all_slow_tests }}
        run: |
          uv run python - <<'PY'
          import os
          import re
          from pathlib import Path

          # Read outputs (space/newline separated)
          src_files = os.environ.get('EVAL_SRC', '').split()
          test_files = os.environ.get('EVAL_TESTS', '').split()

          found: set[str] = set()

          def has_tests(dir_path: Path) -> bool:
              if not dir_path.is_dir():
                  return False
              # Look for pytest-style test files anywhere under the directory
              for f in dir_path.rglob('*.py'):
                  name = f.name
                  if name.startswith('test_') or name.endswith('_test.py'):
                      return True
              return False

          def maybe_add(eval_dir: str) -> None:
              p = Path('tests') / eval_dir
              if has_tests(p):
                  found.add(str(p))

          run_all = os.environ.get('RUN_ALL_SLOW', '') == 'true'

          if run_all:
              # Audit/full mode: enumerate every tests/<eval> dir and ignore the
              # changed-files diff, so ALL slow tests are selected to run.
              for child in sorted(Path('tests').iterdir()):
                  if child.is_dir() and has_tests(child):
                      found.add(str(child))
          else:
              # From src changes -> tests/<eval>/
              for f in src_files:
                  p = Path(f)
                  # Skip README.md files
                  if p.name.lower() == 'readme.md':
                      continue
                  parts = p.parts
                  if len(parts) >= 3 and parts[0] == 'src' and parts[1] == 'inspect_evals':
                      maybe_add(parts[2])

              # From tests changes -> tests/<eval>/
              for f in test_files:
                  p = Path(f)
                  # Skip README.md files
                  if p.name.lower() == 'readme.md':
                      continue
                  parts = p.parts
                  if len(parts) >= 2 and parts[0] == 'tests':
                      maybe_add(parts[1])

          ISOLATED_EVALS = {
              'kernelbench', 'novelty_bench', 'livebench',
              'mle_bench', 'cve_bench', 'bold', 'abstention_bench',
          }

          # Defense-in-depth: these names derive from PR-controlled changed-file
          # paths and are written to $GITHUB_ENV and passed to the shell. Reject
          # anything that isn't a plain eval directory name (also catches '..',
          # which would otherwise resolve tests/.. to the whole repo).
          safe_name = re.compile(r'^[A-Za-z0-9_-]+$')

          isolated_envs: list[str] = []
          root_paths: list[str] = []
          for p in sorted(found):
              eval_name = Path(p).name
              if not safe_name.fullmatch(eval_name):
                  raise ValueError(
                      f'Refusing unsafe eval directory name from changed files: {eval_name!r}'
                  )
              if eval_name in ISOLATED_EVALS:
                  isolated_envs.append(eval_name)
              else:
                  root_paths.append(p)

          root_paths_str = ' '.join(root_paths)
          isolated_envs_str = ','.join(isolated_envs)

          with open(os.environ['GITHUB_ENV'], 'a') as env_file:
              env_file.write(f'TEST_PATHS={root_paths_str}\n')
              env_file.write(f'ISOLATED_TOX_ENVS={isolated_envs_str}\n')

          if root_paths_str:
              print(f'Root env test paths: {root_paths_str}')
          if isolated_envs_str:
              print(f'Isolated eval tox environments: {isolated_envs_str}')
          if not root_paths_str and not isolated_envs_str:
              print('No eval test paths derived; skipping targeted slow run.')
          PY

      - name: Cache uv downloads
        if: env.TEST_PATHS != '' || env.ISOLATED_TOX_ENVS != ''
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/uv
          key: ${{ matrix.os }}-uv-3.12-${{ hashFiles('**/uv.lock', '**/pyproject.toml') }}
          restore-keys: |
            ${{ matrix.os }}-uv-3.12-
            ${{ matrix.os }}-uv-

      - name: Install dependencies
        if: env.TEST_PATHS != '' || env.ISOLATED_TOX_ENVS != ''
        run: |
          uv sync --frozen --group dev --group test_py312_or_higher --group test

      - name: Check for slow tests in derived paths
        id: check_slow
        shell: bash
        if: env.TEST_PATHS != '' || env.ISOLATED_TOX_ENVS != ''
        run: |
          uv run python - <<'PY'
          import os
          from pathlib import Path

          ISOLATED_EVALS = {
              'kernelbench', 'novelty_bench', 'livebench',
              'mle_bench', 'cve_bench', 'bold', 'abstention_bench',
          }

          def scan_for_slow(paths: list[str]) -> bool:
              for path_str in paths:
                  path = Path(path_str)
                  if not path.exists():
                      continue
                  for f in path.rglob("*.py"):
                      name = f.name
                      if name.startswith("test_") or name.endswith("_test.py"):
                          try:
                              text = f.read_text(encoding='utf-8')
                              if '@pytest.mark.slow' in text:
                                  print(f'Found slow tests in: {f}')
                                  return True
                          except Exception:
                              pass
              return False

          root_paths = os.environ.get('TEST_PATHS', '').split()
          isolated_envs = [e for e in os.environ.get('ISOLATED_TOX_ENVS', '').split(',') if e]
          isolated_paths = [str(Path('tests') / e) for e in isolated_envs]

          has_slow = scan_for_slow(root_paths)
          has_isolated_slow = scan_for_slow(isolated_paths)

          with open(os.environ['GITHUB_ENV'], 'a') as env_file:
              env_file.write(f'HAS_SLOW_TESTS={str(has_slow).lower()}\n')
              env_file.write(f'HAS_ISOLATED_SLOW_TESTS={str(has_isolated_slow).lower()}\n')

          if has_slow:
              print('Slow tests detected in root paths - will run targeted pytest suite.')
          if has_isolated_slow:
              print('Slow tests detected in isolated evals - will run targeted tox suite.')
          if not has_slow and not has_isolated_slow:
              print('No slow tests found in changed paths - skipping targeted runs.')
          PY
      - name: Run targeted tests
        if: env.HAS_SLOW_TESTS == 'true'
        # No HF/Kaggle secrets on the fork-PR path (incident 2026-06-09).
        shell: bash
        run: |
          uv run pytest -n 2 -rA --color=yes --durations=50 --suppress-no-test-exit-code "$TEST_PATHS"

      - name: Run targeted isolated eval slow tests via tox
        if: env.HAS_ISOLATED_SLOW_TESTS == 'true'
        # tox/tox-uv come from the locked dev group installed by "Install
        # dependencies" above (uv sync), so the version is pinned via uv.lock and
        # dependabot-managed — no separate unpinned `pip install` needed.
        # No HF/Kaggle secrets on the fork-PR path (incident 2026-06-09).
        run: uv run --no-sync tox -e "$ISOLATED_TOX_ENVS"

  tox-isolated-evals:
    name: Isolated eval tests (tox)
    runs-on: ubuntu-latest-8-cores
    env:
      UV_PYTHON: "3.12"
    steps:
      # Defense-in-depth (incident 2026-06-09): see the test job for rationale.
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            api.github.com:443
            datasets-server.huggingface.co:443
            files.pythonhosted.org:443
            github.com:443
            *.blob.core.windows.net:443
            pypi.org:443
            raw.githubusercontent.com:443
            releases.astral.sh:443

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: UKGovernmentBEIS/inspect_evals
          ref: ${{ github.event.client_payload.ref || inputs.ref }}
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Cache uv downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/uv
          key: ${{ runner.os }}-uv-3.12-isolated-${{ hashFiles('packages/*/uv.lock', 'packages/*/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-3.12-isolated-
            ${{ runner.os }}-uv-3.12-

      - name: Install tox (locked dev group; no project build)
        # tox/tox-uv come from inspect_evals' locked dev group, so the version is
        # pinned via uv.lock (and dependabot-managed) rather than an unpinned
        # `pip install`. --no-install-project avoids building the untrusted PR
        # package just to get the test runner.
        run: uv sync --frozen --only-group dev --no-install-project

      - name: Run isolated eval tests via tox
        # No HF/Kaggle secrets on the fork-PR path (incident 2026-06-09): mle_bench's
        # Kaggle tests skip themselves when KAGGLE_* is absent.
        run: uv run --no-sync tox -e kernelbench,novelty_bench,livebench,mle_bench,cve_bench,bold,abstention_bench

  report-status:
    name: Report test status
    runs-on: ubuntu-latest
    needs:
      - set-pending-status
      - test
      - slow-test-check
      - clean-install-test
      - targeted-slow-tests
      - tox-isolated-evals
    if: always()
    steps:
      - name: Determine overall status
        id: status
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          # Check if any required job failed (excluding set-pending-status which we need to succeed)
          # Parse results, skipping set-pending-status and skipped jobs
          failed=false
          for job in $(echo "$NEEDS_JSON" | jq -r 'to_entries[] | select(.key != "set-pending-status") | select(.value.result != "skipped") | .key + ":" + .value.result'); do
            result="${job#*:}"
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              failed=true
              break
            fi
          done

          if [ "$failed" = "true" ]; then
            echo "state=failure" >> "$GITHUB_OUTPUT"
            echo "description=Tests failed" >> "$GITHUB_OUTPUT"
          else
            echo "state=success" >> "$GITHUB_OUTPUT"
            echo "description=Tests succeeded" >> "$GITHUB_OUTPUT"
          fi

      - name: Update commit status
        # INSPECT_EVALS_CHECKS_TOKEN: see the set-pending-status job for what this
        # token is for and the least-privilege permissions it needs.
        env:
          GH_TOKEN: ${{ secrets.INSPECT_EVALS_CHECKS_TOKEN }}
          SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
          COMMIT_REF: ${{ github.event.client_payload.ref }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          STATUS_STATE: ${{ steps.status.outputs.state }}
          STATUS_DESC: ${{ steps.status.outputs.description }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${SOURCE_REPO}/statuses/${COMMIT_REF}" \
            -f state="${STATUS_STATE}" \
            -f target_url="https://github.com/${REPO}/actions/runs/${RUN_ID}" \
            -f description="${STATUS_DESC}" \
            -f context="Tests (inspect-evals-actions)"
