---
name: Smoke Test (Windows)

"on":
  workflow_dispatch:
    inputs:
      inspect_evals_ref:
        description: "inspect_evals branch/tag/commit to checkout"
        required: false
        default: ""
        type: string
  schedule:
    - cron: "0 14 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# zizmor: excessive-permissions (https://docs.zizmor.sh/audits/#excessive-permissions)
permissions:
  contents: read

env:
  HF_TOKEN: ${{ secrets.HF_ACCESS_TOKEN }}
  KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
  KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
  LANG: C.UTF-8
  LC_ALL: C.UTF-8
  PYTHONUTF8: "1"

jobs:
  smoke-test-windows:
    name: Smoke test (Windows)
    runs-on: windows-latest-8-cores
    steps:
      - name: Checkout inspect_evals repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: UKGovernmentBEIS/inspect_evals
          ref: ${{ inputs.inspect_evals_ref || '' }}
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          prune-cache: false

      - name: Cache Hugging Face datasets
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/huggingface
          key: hf-datasets-${{ runner.os }}-py3.11-${{ hashFiles('uv.lock') }}

      - name: Cache Kaggle TOS verification
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/inspect_evals/mle_bench/tos_accepted
          key: kaggle-tos-${{ runner.os }}-v1

      - name: Install dependencies
        shell: bash
        run: |
          uv sync --frozen --group dev --group test_py311_or_lower --group test

      - name: Run test
        shell: pwsh
        run: |
          uv run python tools/run_evals.py `
            --no-fail-fast `
            --eval-timeout-mins 15 `
            --clean-after-chunk `
          2>&1 | Tee-Object smoke_output.log
          exit 0

      - name: Upload smoke output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-test-output
          path: smoke_output.log

  summarise-smoke:
    needs: smoke-test-windows
    runs-on: windows-latest-8-cores

    steps:
      - name: Checkout inspect-evals-actions
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download smoke output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: smoke-test-output
          path: .

      - name: Generate summary
        id: summary
        if: always()
        shell: bash
        run: |
          ./scripts/smoke/summarise_smoke_test_log.sh \
            smoke_output.log \
            "Smoke Test Summary (Windows)" \
          > smoke_summary.txt

      - name: Notify slack if there are unexpected failures
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: ${{ always() && (steps.summary.conclusion == 'failure') }}
        shell: bash
        run: |
          ./scripts/send_to_slack.sh smoke_summary.txt "$SLACK_WEBHOOK_URL"

      - name: Find stale skips
        id: stale
        if: always()
        shell: bash
        run: |
          ./scripts/smoke/find_stale_skips.sh \
            smoke_output.log \
            "Tasks With Out-Of-Date Skips (Windows)" \
          > stale_skips.txt

      - name: Notify slack if there are stale skip marks
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: ${{ always() && (steps.stale.conclusion == 'failure') }}
        shell: bash
        run: |
          ./scripts/send_to_slack.sh stale_skips.txt "$SLACK_WEBHOOK_URL"

